<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="head">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h10M4 18h13" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="20" cy="18" r="2.4" fill="#fff"/>
      </svg>
    </div>
    <div class="head-text">
      <h1>Profile Data Extractor</h1>
      <p>Pull structured fields from the open profile</p>
    </div>
  </div>

  <div class="body">

    <div class="target-row">
      <span class="dot" id="dot"></span>
      <span id="targetLabel">Checking current tab…</span>
    </div>

    <button id="extractBtn">
      <span class="spinner" id="spinner"></span>
      <span id="btnLabel">Extract profile data</span>
    </button>

    <div class="history-section">
      <div class="history-header">
        <span class="history-title">Recent profiles</span>
        <span class="history-count" id="historyCount">0</span>
      </div>
      <div class="history-empty" id="historyEmpty">No profiles scraped yet.</div>
      <ul class="history-list" id="historyList"></ul>
    </div>

  </div>

<script src="popup.js"></script>
</body>
</html>
